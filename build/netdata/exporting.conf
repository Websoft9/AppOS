[appos]
    managed = yes

[exporting:global]
    enabled = yes
    send configured labels = yes
    send automatic labels = no
    update every = 10

[prometheus_remote_write:appos_local_victoriametrics]
    enabled = yes
    destination = 127.0.0.1:8428
    remote write URL path = /api/v1/write
    data source = average
    prefix = netdata
    hostname = appos-core
    update every = 10
    buffer on failures = 10
    timeout ms = 20000
    send names instead of ids = yes
    send variables = no
    send charts matching = system.cpu system.ram system.io system.net net.net disk_space.*