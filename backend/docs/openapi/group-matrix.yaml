version: 1
name: openapi-group-matrix
source: specs/implementation-artifacts/story1.7-swagger.md
routerfilepath: backend/domain/routes

# Documentation types (critical):
# 1) Business Logic Routes -> matrix-driven generation from route code to the generated custom-route spec (ext-api.yaml)
# 2) PB Native Web APIs -> manual maintenance in native-api.yaml
# 3) Final Runtime Contract -> merged api.yaml (served at /openapi/spec)
# Connector maintenance rule:
# - /api/connectors* is generated from backend/domain/routes/connectors.go via openapi-gen.
# - /api/collections/connectors/records* is Native Record CRUD and must be maintained here + native-api.yaml.

groups:
  - group: Auth
    description: User and authentication operations across Ext admin APIs and Native users auth + record CRUD actions.
    apiType: Mixed
    extSurface:
      - /api/ext/users/*
    nativeSurface:
      - POST /api/collections/users/auth-with-password
      - POST /api/collections/users/auth-refresh
      - POST /api/collections/users/request-password-reset
      - POST /api/collections/users/confirm-password-reset
      - POST /api/collections/users/request-verification
      - POST /api/collections/users/confirm-verification
      - POST /api/collections/users/request-email-change
      - POST /api/collections/users/confirm-email-change
      - GET /api/collections/users/records
      - POST /api/collections/users/records
      - GET /api/collections/users/records/{id}
      - PATCH /api/collections/users/records/{id}
      - DELETE /api/collections/users/records/{id}
    sources:
      extRouteFiles:
        - users.go
      nativeRefs:
        - https://pocketbase.io/docs/api-records/#auth-record-actions
        - https://pocketbase.io/docs/api-records/#crud-actions

  - group: Audit
    description: Audit querying and audit trail visibility endpoints from Native Record CRUD actions.
    apiType: Native
    extSurface: []
    nativeSurface:
      - GET /api/collections/audit_logs/records
      - GET /api/collections/audit_logs/records/{id}
    sources:
      extRouteFiles: []
      nativeRefs:
        - https://pocketbase.io/docs/api-records/#crud-actions

  - group: Backups
    description: Backups management APIs.
    apiType: Mixed
    extSurface:
      - /api/ext/backup/*
    nativeSurface:
      - GET /api/backups
      - POST /api/backups
      - GET /api/backups/{name}
      - DELETE /api/backups/{name}
      - POST /api/backups/{name}/restore
    sources:
      extRouteFiles:
        - backup.go
      nativeRefs:
        - https://pocketbase.io/docs/api-backups/

  - group: Docker
    description: Docker operations including compose, image, container, network and volume management.
    apiType: Ext
    extSurface:
      - /api/ext/docker/*
    nativeSurface: []
    sources:
      extRouteFiles:
        - docker.go
      nativeRefs: []

  - group: Actions
    description: Lifecycle action APIs for install inputs, action history, execution detail, and logs.
    apiType: Ext
    extSurface:
      - GET /api/actions
      - GET /api/actions/{id}
      - DELETE /api/actions/{id}
      - POST /api/actions/{id}/cancel
      - GET /api/actions/{id}/logs
      - GET /api/actions/{id}/stream
      - POST /api/actions/install/git-compose
      - POST /api/actions/install/git-compose/check
      - POST /api/actions/install/name-availability
      - POST /api/actions/install/manual-compose
      - POST /api/actions/install/manual-compose/check
    nativeSurface: []
    sources:
      extRouteFiles:
        - deploy.go
      nativeRefs: []

  - group: Pipelines
    description: Pipeline run inventory and detail APIs for lifecycle-native execution tracking.
    apiType: Ext
    extSurface:
      - GET /api/pipelines
      - GET /api/pipelines/{id}
    nativeSurface: []
    sources:
      extRouteFiles:
        - deploy.go
      nativeRefs: []

  - group: Releases
    description: Release inventory and app-scoped release inspection APIs.
    apiType: Ext
    extSurface:
