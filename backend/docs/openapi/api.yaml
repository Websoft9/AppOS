        AuditLogRecord:
            properties:
                action:
                    description: 'Dot-notation event name. Format: {resource_type}.{verb}. Published actions are immutable.'
                    example: app.deploy
                    type: string
                created:
                    format: date-time
                    type: string
                detail:
                    additionalProperties: true
                    description: Arbitrary JSON payload. Known keys include errorCode, errorMessage, taskId, user_agent.
                    nullable: true
                    type: object
                id:
                    example: abc123xyz
                    type: string
                ip:
                    description: Source IP address. Empty for async/cron workers.
                    type: string
                resource_id:
                    description: Target resource ID.
                    type: string
                resource_name:
                    description: Redundant human-readable name of the target resource.
                    type: string
                resource_type:
                    description: 'One of: app, service, backup, user, file.'
                    example: app
                    type: string
                status:
                    description: Outcome of the operation.
                    enum:
                        - pending
                        - success
                        - failed
                    type: string
                user_email:
                    description: Redundant copy of user email for readability after user deletion.
                    format: email
                    type: string
                user_id:
                    description: Actor user ID. `system` for async/cron-triggered writes.
                    example: usr_abc123
                    type: string
            type: object
