openapi: 3.0.3
info:
    description: |
        Machine-generated OpenAPI specification for AppOS custom API routes, using group-matrix as the single source of truth.
    title: AppOS API
    version: 0.1.0
tags:
    - description: User and authentication operations across Ext admin APIs and Native users auth + record CRUD actions.
      name: Auth
    - description: Audit log query APIs — native collection record endpoints
      name: Audit
    - description: Backups management APIs.
      name: Backups
    - description: Docker operations including compose, image, container, network and volume management.
      name: Docker
    - description: Deployment orchestration APIs for manual compose submission, status, detail, and logs.
      name: Deploy
    - description: Installed app inventory and lifecycle APIs backed by compose projects.
      name: Apps
    - description: Native service health endpoint
      name: Health
    - description: Infrastructure-as-Code workspace and template file operations.
      name: IaC
    - description: OpenAPI UI and raw specification serving endpoints.
      name: OpenAPI Docs
    - description: Reverse proxy domain management and SSL automation endpoints.
      name: Proxy
    - description: Initial setup and login bootstrap workflows for AppOS.
      name: Setup
    - description: Native realtime connect and subscribe APIs
      name: Realtime
    - description: Resource catalog APIs excluding server registry.
      name: Resource
    - description: SSH interactive shell sessions.
      name: Server Shell
    - description: Container operations on managed servers.
      name: Server Containers
    - description: Server file management over SSH/SFTP.
      name: Server Files
    - description: Server operations for connectivity, power, ports, and systemd.
      name: Server Ops
    - description: Service lifecycle operations exposed via supervisord integration.
      name: Services
    - description: Installed component inventory and diagnostics registry APIs.
      name: Components
    - description: Configuration management spanning System and Workspace settings APIs.
      name: Settings
    - description: Workspace and storage-space related operations.
      name: Space & User Files
    - description: Host metrics, file browser and system shell utility endpoints.
      name: System
    - description: Native cron jobs API
      name: System Cron
    - description: Tunnel lifecycle and connectivity management APIs.
      name: Tunnel
    - description: Topic discussion sharing — time-limited public share links for topics with anonymous comment support.
      name: Topics
    - description: Secrets lifecycle management — encrypted credential CRUD, template listing, payload rotation, internal resolve, and reveal APIs. Uses PB native collection for storage with application-layer AES-256-GCM encryption.
      name: Secrets
    - description: Certificate lifecycle management — template listing, self-signed generation/renewal, and PB native collection CRUD with PEM validation hooks. Private keys are stored via the Secrets module.
      name: Certificates
    - description: Concrete users collection APIs derived from Native Record CRUD actions
      name: Users
components:
    schemas:
        AuditLogList:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/AuditLogRecord'
                    type: array
                page:
                    type: integer
                perPage:
                    type: integer
                totalItems:
                    type: integer
                totalPages:
                    type: integer
            type: object
        AuditLogRecord:
            properties:
                action:
                    description: 'Dot-notation event name. Format: {resource_type}.{verb}. Published actions are immutable.'
                    example: app.deploy
                    type: string
                created:
                    format: date-time
                    type: string
                detail:
                    additionalProperties: true
                    description: Arbitrary JSON payload. Known keys include errorCode, errorMessage, taskId, user_agent.
                    nullable: true
                    type: object
                id:
                    example: abc123xyz
                    type: string
                ip:
                    description: Source IP address. Empty for async/cron workers.
                    type: string
                resource_id:
                    description: Target resource ID.
                    type: string
                resource_name:
                    description: Redundant human-readable name of the target resource.
                    type: string
                resource_type:
                    description: 'One of: app, service, backup, user, file.'
                    example: app
                    type: string
                status:
                    description: Outcome of the operation.
                    enum:
                        - pending
                        - success
                        - failed
                    type: string
                user_email:
                    description: Redundant copy of user email for readability after user deletion.
                    format: email
                    type: string
                user_id:
                    description: Actor user ID. `system` for async/cron-triggered writes.
                    example: usr_abc123
                    type: string
            type: object
        ErrorEnvelope:
            properties:
                code:
                    type: integer
                message:
                    type: string
            required:
                - message
            type: object
        GenericRequest:
            additionalProperties: true
            description: Generic request payload placeholder (refine per endpoint)
            type: object
        PBAuthResponse:
            additionalProperties: true
            description: Generic Native auth response
            type: object
        PBAuthWithPasswordRequest:
            properties:
                identity:
                    description: Username or email.
                    type: string
                password:
                    format: password
                    type: string
            required:
                - identity
                - password
            type: object
        PBConfirmEmailChange:
            properties:
                password:
                    format: password
                    type: string
                token:
                    type: string
            required:
                - token
                - password
            type: object
        PBConfirmPasswordReset:
            properties:
                password:
                    format: password
                    type: string
                passwordConfirm:
                    format: password
                    type: string
                token:
                    type: string
            required:
                - token
                - password
                - passwordConfirm
            type: object
        PBConfirmVerification:
            properties:
                token:
                    type: string
            required:
                - token
            type: object
        PBRecord:
            additionalProperties: true
            description: Generic Native record payload
            type: object
        PBRecordList:
            additionalProperties: true
            description: Generic Native record list payload
            type: object
        PBRequestEmailChange:
            properties:
                newEmail:
                    format: email
                    type: string
            required:
                - newEmail
            type: object
        PBRequestPasswordReset:
            properties:
                email:
                    format: email
                    type: string
            required:
                - email
            type: object
        PBRequestVerification:
            properties:
                email:
                    format: email
                    type: string
            required:
                - email
            type: object
        PBSettings:
            additionalProperties: true
            description: Native app settings payload
            type: object
        SuccessEnvelope:
            additionalProperties: true
            description: Generic success payload envelope
            example:
                ok: true
            type: object
    securitySchemes:
        bearerAuth:
            bearerFormat: PocketBase token
            scheme: bearer
            type: http
