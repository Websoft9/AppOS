        get:
            description: |
                Returns recent structured execution log lines for one cron job, filtered from PocketBase _logs. Only AppOS-instrumented jobs are guaranteed to have rich log data. Non-instrumented native jobs return an empty items array.
            operationId: appos_crons_logs
            parameters:
                - in: path
                  name: jobId
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    items:
                                        items:
                                            properties:
                                                created:
                                                    format: date-time
                                                    type: string
                                                durationMs:
                                                    nullable: true
                                                    type: number
                                                error:
                                                    nullable: true
                                                level:
                                                    type: integer
                                                message:
                                                    type: string
                                                phase:
                                                    enum:
                                                        - start
                                                        - success
                                                        - error
                                                    type: string
                                                runId:
                                                    type: string
                                                trigger:
                                                    enum:
                                                        - scheduled
                                                        - manual
                                                    type: string
                                            type: object
                                        type: array
                                    jobId:
                                        type: string
                                    lastDurationMs:
                                        nullable: true
                                        type: number
                                    lastRun:
                                        format: date-time
                                        nullable: true
                                        type: string
                                    lastStatus:
                                        enum:
                                            - success
                                            - error
                                        nullable: true
                                        type: string
                                type: object
                    description: OK
            security:
                - bearerAuth: []
            summary: Get cron job execution logs
            tags:
                - System Cron
