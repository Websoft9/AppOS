openapi: "3.0.3"

info:
  title: AppOS Ext API
  description: >
    OpenAPI specification for AppOS custom extension routes (/api/ext/*).
    PocketBase built-in collection APIs are not covered here.
  version: "0.1.0"

servers:
  - url: http://localhost:8090
    description: Local development

tags:
  - name: Platform Bootstrap
    description: Setup and auth helper routes (unauthenticated)
  - name: Runtime Operations
    description: Docker, proxy, services, system, backup
  - name: Resource
    description: Resource registry and CRUD domains
  - name: Settings
    description: Ext settings management
  - name: Users
    description: User management routes
  - name: Space
    description: User private space and sharing
  - name: IaC
    description: IaC file management and library operations
  - name: Servers Operate
    description: Terminal (SSH/SFTP/Docker exec)
  - name: Tunnel
    description: Tunnel lifecycle and setup routes
  - name: Logs
    description: Log querying endpoints across services and runtime
  - name: Audit
    description: Audit querying endpoints (reserved/current-future)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PocketBase token
  schemas:
    GenericRequest:
      type: object
      additionalProperties: true
      description: Generic request payload placeholder (refine per endpoint)
    SuccessEnvelope:
      type: object
      additionalProperties: true
      description: Generic success payload envelope
      example:
        ok: true
    ErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [message]

# paths are added incrementally — one entry per /api/ext/* path.
paths:
  /api/ext/auth/check-email:
    post:
      tags: [Platform Bootstrap]
      summary: Create or execute auth check email
      operationId: post_api_ext_auth_check-email
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      security: []  # public
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/ext/backup/create:
    post:
