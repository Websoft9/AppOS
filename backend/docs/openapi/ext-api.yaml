openapi: "3.0.3"

info:
  title: AppOS API
  description: >
    Machine-generated OpenAPI specification for AppOS custom API routes, using group-matrix as the single source of truth.
  version: "0.1.0"

tags:
  - name: Actions
    description: "Lifecycle action APIs for install inputs, action history, execution detail, and logs."
  - name: AI Providers
    description: "AI provider template discovery and managed AI provider CRUD APIs."
  - name: Apps
    description: "Installed app inventory and lifecycle APIs backed by compose projects."
  - name: Auth
    description: "User and authentication operations across Ext admin APIs and Native users auth + record CRUD actions."
  - name: Backups
    description: "Backups management APIs."
  - name: Catalog
    description: "Canonical app catalog read and personalization APIs."
  - name: Certificates
    description: "Certificate template, self-signed issuance, renewal, and native record CRUD APIs."
  - name: Components
    description: "Installed component inventory and diagnostics registry APIs."
  - name: Connectors
    description: "Connector catalog, template, and native record CRUD APIs."
  - name: Docker
    description: "Docker operations including compose, image, container, network and volume management."
  - name: Exposures
    description: "Exposure inventory and app-scoped publication inspection APIs."
  - name: IaC
    description: "Infrastructure-as-Code workspace and template file operations."
  - name: Monitoring
    description: "Monitoring overview, container telemetry, target status and series queries."
  - name: Monitoring Ingest
    description: "Metrics ingestion endpoints used by managed-server collectors."
  - name: Pipelines
    description: "Pipeline run inventory and detail APIs for lifecycle-native execution tracking."
  - name: Provider Accounts
    description: "Provider account catalog and template APIs for cloud and platform credentials."
  - name: Proxy
    description: "Reverse proxy domain management and SSL automation endpoints."
  - name: Releases
    description: "Release inventory and app-scoped release inspection APIs."
  - name: Resource
    description: "Generic resource-store collection APIs for scripts only."
  - name: Secrets
    description: "Secret storage, rotation, resolve, and reveal APIs."
  - name: Servers
    description: "Server registry CRUD and remote operations APIs for connectivity, power, ports, monitor-agent deployment, and systemd management."
  - name: Service Instances
    description: "Service instance catalog and template APIs for managed external services."
  - name: Services
    description: "Service lifecycle operations exposed via supervisord integration."
  - name: Settings
    description: "Configuration management spanning System and Workspace settings APIs."
  - name: Setup
    description: "Initial setup and login bootstrap workflows for AppOS."
  - name: Software
    description: "Software inventory, capability readiness, lifecycle operations, action dispatch, local inventory, and supported server-software discovery APIs."
  - name: Space & User Files
    description: "Workspace and storage-space related operations."
  - name: System
    description: "Host metrics and file browser endpoints."
  - name: System Cron
    description: "PocketBase scheduled tasks and cron management APIs."
  - name: Terminal
    description: "Interactive terminal and remote file APIs for SSH, Docker exec, SFTP, and local shell sessions."
  - name: Topics
    description: "Topic sharing APIs plus native topic and comment record CRUD endpoints."
  - name: Tunnel
    description: "Tunnel lifecycle and connectivity management APIs."

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PocketBase token
    basicAuth:
      type: http
      scheme: basic
  schemas:
    GenericRequest:
      type: object
      additionalProperties: true
      description: Generic request payload placeholder (refine per endpoint)
    SuccessEnvelope:
      type: object
      additionalProperties: true
      description: Generic success payload envelope
      example:
        ok: true
    ErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [message]

    MonitorContainerTelemetryResponse:
      type: object
      properties:
        serverId:
          type: string
        window:
          type: string
        rangeStartAt:
          type: string
        rangeEndAt:
          type: string
        stepSeconds:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/MonitorContainerTelemetryItem'
    MonitorErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        maxBytes:
          type: integer
    MonitorMetricSeriesResponse:
      type: object
      properties:
        targetType:
          type: string
        targetId:
          type: string
        window:
          type: string
        rangeStartAt:
          type: string
        rangeEndAt:
          type: string
        stepSeconds:
          type: integer
        series:
          type: array
          items:
            $ref: '#/components/schemas/MonitorMetricSeries'
        availableNetworkInterfaces:
          type: array
          items:
            type: string
        selectedNetworkInterface:
          type: string
    MonitorOverviewResponse:
      type: object
      properties:
        counts:
          type: object
          additionalProperties:
            type: integer
        unhealthyItems:
          type: array
          items:
            $ref: '#/components/schemas/MonitorOverviewItem'
        platformItems:
          type: array
          items:
            $ref: '#/components/schemas/MonitorOverviewItem'
    MonitorTargetStatusResponse:
      type: object
      properties:
        hasData:
          type: boolean
        targetType:
          type: string
        targetId:
          type: string
        displayName:
          type: string
        status:
          type: string
        reason:
          type: object
          additionalProperties: true
        signalSource:
          type: string
        lastTransitionAt:
          type: string
        lastSuccessAt:
          type: object
          additionalProperties: true
        lastFailureAt:
          type: object
          additionalProperties: true
        lastCheckedAt:
          type: object
          additionalProperties: true
        lastReportedAt:
          type: object
          additionalProperties: true
        consecutiveFailures:
          type: integer
        summary:
          type: object
          additionalProperties: true
    ConnectorResponseDocument:
      type: object
      properties:
        id:
          type: string
        created:
          type: string
        updated:
          type: string
        name:
          type: string
        kind:
          type: string
        is_default:
          type: boolean
        template_id:
          type: string
        endpoint:
          type: string
        auth_scheme:
          type: string
        provider_account:
          type: string
        credential:
          type: string
        config:
          type: object
          additionalProperties: true
        description:
          type: string
