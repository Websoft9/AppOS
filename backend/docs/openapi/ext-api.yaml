  /api/monitor/targets/{targetType}/{targetId}/series:
    get:
      tags: [Monitoring]
      summary: Get monitor target series
      description: "Returns metric series for a monitor target. targetType accepts server, app, container, or platform. series accepts cpu, memory, disk, disk_usage, network, or network_traffic depending on target type. Use startAt and endAt together for a custom RFC3339 range."
      operationId: get_api_monitor_targets_targettype_targetid_series
      parameters:
        - name: targetType
          in: path
          description: "monitor target type"
          required: true
          schema:
            type: string
            enum:
              - "server"
              - "app"
              - "container"
              - "platform"
        - name: targetId
          in: path
          description: "monitor target ID; platform uses appos-core for AppOS host metrics"
          required: true
          schema:
            type: string
        - name: endAt
          in: query
          description: "custom range end time in RFC3339 format"
          required: false
          schema:
            type: string
        - name: networkInterface
          in: query
          description: "network interface for network series; use all or omit for aggregate"
          required: false
          schema:
            type: string
        - name: series
          in: query
          description: "metric series alias"
          required: false
          schema:
            type: string
            enum:
              - "cpu"
              - "memory"
              - "disk"
              - "disk_usage"
              - "network"
              - "network_traffic"
        - name: startAt
          in: query
          description: "custom range start time in RFC3339 format"
          required: false
          schema:
            type: string
        - name: window
          in: query
          description: "fixed time window; ignored when startAt and endAt are both set"
          required: false
          schema:
            type: string
            enum:
              - "15m"
              - "1h"
              - "5h"
              - "6h"
              - "12h"
              - "1d"
              - "24h"
              - "7d"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorMetricSeriesResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorErrorResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorErrorResponse'
  /api/monitor/write:
    post:
      tags: [Monitoring Ingest]
      summary: Write Netdata metrics
      description: "Receives Prometheus remote-write protobuf payloads from managed-server Netdata agents. This endpoint is served by the AppOS backend and forwards accepted payloads to the embedded time-series database. Authenticate with HTTP Basic Auth where username is the server record ID and password is the per-server monitor agent token issued during Netdata install/update. Reverse-proxy forwarding headers used elsewhere for agent URL generation are parsed defensively only the first comma-separated host/port value is used and forwarded ports must be numeric."
      operationId: post_api_monitor_write
      parameters:
        - name: Authorization
          in: header
          description: "Basic base64(serverId:monitorAgentToken)"
          required: true
          schema:
            type: string
        - name: Content-Encoding
          in: header
          description: "remote-write compression, usually snappy"
          required: false
          schema:
            type: string
        - name: Content-Type
          in: header
          description: "application/x-protobuf"
          required: true
          schema:
            type: string
        - name: X-Prometheus-Remote-Write-Version
          in: header
          description: "Prometheus remote-write protocol version"
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-protobuf:
            schema:
              type: string
              format: binary
      security:
        - basicAuth: []
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorErrorResponse'
        "413":
          description: Payload Too Large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorErrorResponse'
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorErrorResponse'
