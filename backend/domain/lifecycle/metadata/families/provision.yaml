family: ProvisionPipeline
description: Provision and runtime bootstrap flows for initial install and runtime start.
intent: Establish or resume an application runtime so the app reaches a healthy running baseline.
touches_domains:
  - AppInstance
  - OperationJob
  - PipelineRun
  - PipelineNodeRun
default_compensation_policy: best_effort
applies_to:
  - install
  - start
  - restart

definitions:
  - key: provision.install.manual_compose
    version: v1
    family: ProvisionPipeline
    operation_types:
      - install
    sources:
      - manualops
    adapters:
      - manual-compose
    initial_phase: validating
    nodes:
      - key: validate_spec
        node_type: validation
        display_name: Validate Spec
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_spec
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime

  - key: provision.install.git_compose
    version: v1
    family: ProvisionPipeline
    operation_types:
      - install
    sources:
      - gitops
    adapters:
      - git-compose
    initial_phase: validating
    nodes:
      - key: validate_spec
        node_type: validation
        display_name: Validate Spec
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_spec
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime

  - key: provision.install.source_build
    version: v1
    family: ProvisionPipeline
    operation_types:
      - install
    sources:
      - manualops
    adapters:
      - source-build
    initial_phase: validating
    nodes:
      - key: validate_source_build_request
        node_type: validation
        display_name: Validate Source Build Request
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: hydrate_source_workspace
        node_type: source_workspace
        display_name: Hydrate Source Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_source_build_request
      - key: prepare_source_runtime_workspace
        node_type: workspace
        display_name: Prepare Source Runtime Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_source_build_request
      - key: build_artifact
        node_type: artifact_build
        display_name: Build Artifact
        phase: executing
        retryable: true
        depends_on:
          - hydrate_source_workspace
          - prepare_source_runtime_workspace
      - key: publish_artifact
        node_type: artifact_publish
        display_name: Publish Artifact
        phase: executing
        retryable: true
        depends_on:
          - build_artifact
      - key: create_candidate_release
        node_type: release_candidate
        display_name: Create Candidate Release
        phase: preparing
        retryable: true
        writes_projection:
          - ReleaseSnapshot
        depends_on:
          - publish_artifact
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - create_candidate_release
      - key: activate_release_runtime
        node_type: runtime_start
        display_name: Activate Release Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - activate_release_runtime

  - key: provision.start
    version: v1
    family: ProvisionPipeline
    operation_types:
      - start
    initial_phase: validating
    nodes:
      - key: validate_runtime_target
        node_type: validation
        display_name: Validate Runtime Target
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_runtime_target
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime

  - key: provision.restart
    version: v1
    family: ProvisionPipeline
    operation_types:
      - restart
    initial_phase: validating
    nodes:
      - key: validate_runtime_target
        node_type: validation
        display_name: Validate Runtime Target
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: restart_runtime
        node_type: runtime_restart
        display_name: Restart Runtime
        phase: executing
        retryable: true
        depends_on:
          - validate_runtime_target
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - restart_runtime
