components:
  - component_key: docker
    target_type: server
    label: Docker
    template_ref: package-systemd
    binary: docker
    service_name: docker.service
    package_name: docker.io
    default_actions:
      - install
      - upgrade
      - verify

  - component_key: reverse-proxy
    target_type: server
    label: Nginx
    template_ref: package-systemd
    binary: nginx
    service_name: nginx.service
    package_name: nginx
    default_actions:
      - install
      - upgrade
      - verify

  - component_key: monitor-agent
    target_type: server
    label: Netdata Agent
    template_ref: script-systemd
    binary: netdata
    service_name: netdata.service
    script_url: https://get.netdata.cloud/kickstart.sh
    default_actions:
      - install
      - upgrade
      - verify

  - component_key: control-agent
    target_type: server
    label: AppOS Control Agent
    template_ref: script-systemd
    binary: appos-control-agent
    service_name: appos-control-agent.service
    # script_url is resolved at runtime from system settings key: software.control_agent_installer_url
    # Do not hardcode a URL here; the executor must read the setting before invoking the template.
    script_url: ""
    default_actions:
      - install
      - upgrade
      - verify
