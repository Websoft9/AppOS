templates:
  package-systemd:
    template_kind: package
    detect:
      version_command: "{{binary}} --version"
      installed_hint:
        - "command -v {{binary}}"
    preflight:
      require_root: true
      require_network: false
      supported_os:
        - ubuntu
        - debian
        - rocky
    install:
      strategy: package
      package_name: "{{package_name}}"
    upgrade:
      strategy: package
      package_name: "{{package_name}}"
    verify:
      strategy: systemd
      service_name: "{{service_name}}"

  script-systemd:
    template_kind: script
    detect:
      version_command: "{{binary}} --version"
      installed_hint:
        - "command -v {{binary}}"
    preflight:
      require_root: true
      require_network: true
      supported_os:
        - ubuntu
        - debian
        - rocky
    install:
      strategy: script
      script_url: "{{script_url}}"
      args: []
    upgrade:
      strategy: script
      script_url: "{{script_url}}"
      args:
        - --upgrade
    verify:
      strategy: systemd
      service_name: "{{service_name}}"