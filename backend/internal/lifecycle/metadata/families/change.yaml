family: ChangePipeline
description: Change-oriented flows that mutate an existing app instance baseline or runtime.
intent: Apply a controlled change to an existing application while preserving an inspectable execution trail.
touches_domains:
  - AppInstance
  - OperationJob
  - ReleaseSnapshot
  - PipelineRun
  - PipelineNodeRun
default_compensation_policy: strict
applies_to:
  - upgrade
  - redeploy
  - reconfigure

definitions:
  - key: change.upgrade
    version: v1
    family: ChangePipeline
    operation_types:
      - upgrade
    initial_phase: validating
    nodes:
      - key: validate_change_request
        node_type: validation
        display_name: Validate Change Request
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: create_candidate_release
        node_type: release
        display_name: Create Candidate Release
        phase: preparing
        retryable: true
        writes_projection:
          - ReleaseSnapshot
        depends_on:
          - validate_change_request
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - create_candidate_release
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime
      - key: activate_release
        node_type: release
        display_name: Activate Release
        phase: verifying
        retryable: false
        writes_projection:
          - ReleaseSnapshot
          - AppInstance
        depends_on:
          - verify_runtime_health

  - key: change.redeploy
    version: v1
    family: ChangePipeline
    operation_types:
      - redeploy
    initial_phase: validating
    nodes:
      - key: validate_change_request
        node_type: validation
        display_name: Validate Change Request
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_change_request
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime

  - key: change.reconfigure
    version: v1
    family: ChangePipeline
    operation_types:
      - reconfigure
    initial_phase: validating
    nodes:
      - key: validate_config_change
        node_type: validation
        display_name: Validate Config Change
        phase: validating
        retryable: false
        writes_projection:
          - OperationJob
      - key: prepare_workspace
        node_type: workspace
        display_name: Prepare Workspace
        phase: preparing
        retryable: true
        depends_on:
          - validate_config_change
      - key: render_runtime_config
        node_type: runtime_config
        display_name: Render Runtime Config
        phase: preparing
        retryable: true
        depends_on:
          - prepare_workspace
      - key: start_runtime
        node_type: runtime_start
        display_name: Start Runtime
        phase: executing
        retryable: true
        depends_on:
          - render_runtime_config
      - key: verify_runtime_health
        node_type: health_check
        display_name: Verify Runtime Health
        phase: verifying
        retryable: true
        writes_projection:
          - AppInstance
        depends_on:
          - start_runtime
