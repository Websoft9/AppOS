name: Publish Images

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive image metadata
        id: meta
        run: |
          set -euo pipefail
          tag_name="${{ github.event.release.tag_name }}"
          version="${tag_name#v}"
          commit_sha="$(git rev-parse HEAD)"
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          docker_image="docker.io/websoft9dev/appos"
          ghcr_image="ghcr.io/${owner_lc}/appos"
          channel="stable"
          preid=""
          if [[ "$version" == *-* ]]; then
            channel="preview"
            prerelease_suffix="${version#*-}"
            preid="${prerelease_suffix%%.*}"
          fi

          tags=(
            "${docker_image}:${tag_name}"
            "${docker_image}:${version}"
            "${ghcr_image}:${tag_name}"
            "${ghcr_image}:${version}"
          )

          if [[ "$channel" == "stable" ]]; then
            tags+=(
              "${docker_image}:stable"
              "${docker_image}:latest"
              "${ghcr_image}:stable"
              "${ghcr_image}:latest"
            )
          else
            tags+=(
              "${docker_image}:preview"
              "${ghcr_image}:preview"
            )
            if [[ -n "$preid" ]]; then
              tags+=(
                "${docker_image}:${preid}"
                "${ghcr_image}:${preid}"
              )
            fi
          fi

          {
            echo "VERSION=${version}"
            echo "CHANNEL=${channel}"
            echo "COMMIT_SHA=${commit_sha}"
            echo "DOCKER_IMAGE=${docker_image}"
            echo "GHCR_IMAGE=${ghcr_image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=AppOS"
            echo "org.opencontainers.image.description=All-in-One container: Web app + PocketBase Framework (AppOS) + Redis + VictoriaMetrics + optional Netdata"
            echo "org.opencontainers.image.url=https://www.websoft9.com"
            echo "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
            echo "org.opencontainers.image.version=${version}"
            echo "org.opencontainers.image.revision=${commit_sha}"
            echo "org.opencontainers.image.ref.name=${tag_name}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.MYGITHUB_ADMIN_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Summarize published tags
        run: |
          {
            echo "### Published Images"
            echo "Channel: ${{ steps.meta.outputs.CHANNEL }}"
            echo "Version: ${{ steps.meta.outputs.VERSION }}"
            echo "Commit: ${{ steps.meta.outputs.COMMIT_SHA }}"
            echo ""
            echo "Tags:"
            while IFS= read -r tag; do
              echo "- \`${tag}\`"
            done <<'EOF'
${{ steps.meta.outputs.tags }}
EOF
          } >> "$GITHUB_STEP_SUMMARY"