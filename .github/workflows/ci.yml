name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Prepare Go tool bin
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Install golangci-lint
        run: GOBIN="$RUNNER_TEMP/bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Verify golangci-lint
        run: |
          "$RUNNER_TEMP/bin/golangci-lint" version
          go version

      - name: Run lint
        run: make lint
        env:
          GOLANGCI_LINT_BIN: ${{ runner.temp }}/bin/golangci-lint

  # ─── Backend Test ────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        run: make test backend

  # ─── Frontend Test ───────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Run frontend tests
        run: make test web

  # ─── Security ────────────────────────────────────────────────────────────────
  sec:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_ARTIFACT_NAME: gitleaks-report-${{ github.sha }}
      GITLEAKS_REPORT_PATH: build/reports/gitleaks-report.json
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for gitleaks git-mode scanning
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Prepare Go tool bin
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install govulncheck
        run: GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GL_VERSION="8.24.2"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) GL_ARCH="x64" ;;
            aarch64|arm64) GL_ARCH="arm64" ;;
            *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
          esac
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_${GL_ARCH}.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks

      - name: Verify security tools
        run: |
          "$RUNNER_TEMP/bin/govulncheck" -version
          "$RUNNER_TEMP/bin/gitleaks" version

      - name: Run security checks
        run: make sec fast
        env:
          GOVULNCHECK_BIN: ${{ runner.temp }}/bin/govulncheck
          GITLEAKS_BIN: ${{ runner.temp }}/bin/gitleaks
          GITLEAKS_REPORT_PATH: ${{ env.GITLEAKS_REPORT_PATH }}

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GITLEAKS_ARTIFACT_NAME }}
          path: ${{ env.GITLEAKS_REPORT_PATH }}
          if-no-files-found: ignore

      - name: Announce gitleaks report
        if: always()
        run: |
          if [ -f "$GITLEAKS_REPORT_PATH" ]; then
            echo "gitleaks report uploaded as artifact: $GITLEAKS_ARTIFACT_NAME"
            echo "Report path: $GITLEAKS_REPORT_PATH"
            {
              echo "### Gitleaks Report"
              echo "Artifact: $GITLEAKS_ARTIFACT_NAME"
              echo "Path: $GITLEAKS_REPORT_PATH"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No gitleaks report file was generated."
          fi

  # ─── Container Image Scan ────────────────────────────────────────────────────
  scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend, sec]
    # Only run on pushes to main (images are published after merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write          # required for SBOM dependency snapshot upload
      security-events: write   # required for SARIF upload to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: make image build

      - name: Trivy image scan — table (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: websoft9/appos:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"   # advisory; report but don't block

      - name: Trivy image scan — SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: websoft9/appos:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM and upload to GitHub Dependency Graph
        uses: anchore/sbom-action@v0
        with:
          image: websoft9/appos:latest
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          artifact-name: sbom-${{ github.sha }}
          dependency-snapshot: true   # pushes to GitHub Dependency Graph
