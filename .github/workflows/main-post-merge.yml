name: Main Post-Merge

on:
  push:
    branches: [main]

concurrency:
  group: main-post-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/_quality-gate.yml

  build-image:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v5

      - name: Build production image
        run: make image build

  advisory-image-security:
    name: Advisory Image Security
    runs-on: ubuntu-latest
    needs: [quality-gate, build-image]
    continue-on-error: true
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Build production image
        run: make image build

      - name: Trivy image scan — table (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: websoft9dev/appos:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Trivy image scan — SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: websoft9dev/appos:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM and upload to GitHub Dependency Graph
        uses: anchore/sbom-action@v0
        with:
          image: websoft9dev/appos:latest
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          artifact-name: sbom-${{ github.sha }}
          dependency-snapshot: true

      - name: Summarize advisory scope
        if: always()
        run: |
          {
            echo "### Advisory Post-Merge Checks"
            echo "The image build is a blocking main-branch health check."
            echo "Trivy and SBOM publication run as advisory post-merge checks so they surface issues without redefining main health."
          } >> "$GITHUB_STEP_SUMMARY"